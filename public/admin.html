<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Compliment Hotline — Admin</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" href="/svg/favicon.svg" />
    <style>
      :root { color-scheme: dark; font-family: "Space Grotesk", ui-sans-serif, system-ui; }
      body { margin: 0; background: #0B0820; color: #FCE8C8; padding: 40px 24px; }
      main { max-width: 900px; margin: 0 auto; }
      h1 { font-family: "Monoton", cursive; font-size: 3rem; color: #FFD23F; letter-spacing: .08em; }
      .card { background: rgba(26,16,64,0.7); border: 1px solid rgba(252,232,200,0.15); border-radius: 16px; padding: 24px; margin-bottom: 16px; }
      input, button { font: inherit; }
      input[type=password], input[type=text] {
        background: #0B0820; border: 1px solid rgba(252,232,200,0.2); color: #FCE8C8;
        padding: 12px 16px; border-radius: 12px; width: 100%; max-width: 360px;
      }
      button { background: #FF5E6C; color: #0B0820; border: 0; padding: 10px 18px; border-radius: 999px; font-weight: 700; cursor: pointer; margin-right: 8px; }
      button.secondary { background: transparent; color: #FCE8C8; border: 1px solid rgba(252,232,200,0.3); }
      button.danger { background: #E94BD6; }
      .row { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 12px; flex-wrap: wrap; }
      .meta { color: rgba(252,232,200,0.6); font-size: .85rem; letter-spacing: .1em; text-transform: uppercase; }
      .msg { font-size: 1.1rem; line-height: 1.4; }
      audio { width: 100%; max-width: 420px; }
      .empty { opacity: .6; text-align: center; padding: 40px; }
    </style>
  </head>
  <body>
    <main>
      <h1>HOTLINE / ADMIN</h1>
      <div id="login" class="card" style="display:none">
        <div class="meta">Sign in</div>
        <div class="row">
          <input id="token" type="password" placeholder="admin token" autocomplete="current-password" />
          <button id="login-btn">Unlock</button>
        </div>
        <div id="login-err" style="color:#FF5E6C"></div>
      </div>
      <div id="queue"></div>
    </main>
    <script>
      const $ = (id) => document.getElementById(id);
      async function api(path, opts) {
        const res = await fetch(path, { credentials: "include", ...opts });
        return res.json();
      }
      async function checkAuth() {
        const r = await api("/api/admin/login");
        return r.ok && r.data.logged_in;
      }
      async function login() {
        const token = $("token").value;
        const r = await api("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token }),
        });
        if (r.ok) { render(); } else { $("login-err").textContent = r.error || "failed"; }
      }
      async function loadQueue() {
        const r = await api("/api/admin/queue");
        if (!r.ok) { $("queue").innerHTML = `<div class="card">error: ${r.error}</div>`; return; }
        const items = r.data.items;
        if (!items.length) { $("queue").innerHTML = '<div class="empty">queue empty. you are loved.</div>'; return; }
        $("queue").innerHTML = items.map(renderItem).join("");
        document.querySelectorAll("[data-approve]").forEach((b) => b.onclick = () => act(b.dataset.approve, "approve"));
        document.querySelectorAll("[data-reject]").forEach((b) => b.onclick = () => act(b.dataset.reject, "reject"));
      }
      function renderItem(c) {
        const when = new Date(c.created_at * 1000).toLocaleString();
        const audio = c.audio_key ? `<audio controls src="/api/admin/audio/${c.id}"></audio>` : "";
        const msg = c.message ? `<div class="msg">"${escapeHtml(c.message)}"</div>` : "";
        return `
          <div class="card">
            <div class="meta">#${c.id} · ${escapeHtml(c.name || "anonymous")} · ${when}</div>
            ${msg}
            ${audio}
            <div class="row" style="margin-top:12px">
              <button data-approve="${c.id}">✓ Approve</button>
              <button class="danger" data-reject="${c.id}">✗ Reject</button>
            </div>
          </div>`;
      }
      function escapeHtml(s) { return s.replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
      async function act(id, verb) {
        const body = verb === "reject" ? { id: Number(id), reason: prompt("reason?") || "" } : { id: Number(id) };
        const r = await api(`/api/admin/${verb}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (r.ok) loadQueue(); else alert(r.error);
      }
      async function render() {
        const auth = await checkAuth();
        if (!auth) { $("login").style.display = "block"; $("queue").innerHTML = ""; return; }
        $("login").style.display = "none";
        loadQueue();
      }
      $("login-btn").onclick = login;
      $("token").onkeydown = (e) => { if (e.key === "Enter") login(); };
      render();
    </script>
  </body>
</html>
